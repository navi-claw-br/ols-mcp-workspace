# rbac.yaml - Permissoes RBAC para o MCP Server e usuarios do Lightspeed
---
# ClusterRole para o ServiceAccount do MCP server (acesso minimo)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubernetes-mcp-server-role
rules:
  # O MCP server usa passthrough auth, entao o SA precisa de permissoes minimas
  # O token do usuario e que define o que pode ser feito
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  - apiGroups: ["project.openshift.io"]
    resources: ["projects"]
    verbs: ["get", "list"]
---
# Binding do ClusterRole ao SA do MCP server
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubernetes-mcp-server-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubernetes-mcp-server-role
subjects:
  - kind: ServiceAccount
    name: kubernetes-mcp-server
    namespace: kubernetes-mcp-server
---
# ClusterRole para usuarios do Lightspeed acessarem o servico
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lightspeed-user-access
rules:
  - apiGroups: ["oauth.openshift.io"]
    resources: ["oauthaccesstokens"]
    verbs: ["get"]
  - apiGroups: ["user.openshift.io"]
    resources: ["users", "groups"]
    verbs: ["get", "list"]
---
# Nota: conceder acesso aos usuarios:
# oc adm policy add-cluster-role-to-user ols-user <usuario>
# oc adm policy add-cluster-role-to-user view <usuario>
# oc adm policy add-cluster-role-to-user cluster-monitoring-view <usuario>
