# lightspeed-stack.yaml - Configuracao BYOK para Lightspeed Core
#
# Este arquivo configura o Lightspeed Core Service com BYOK
# sobre Red Hat Connectivity Link.
#
# Para usar, execute primeiro o script de indexacao:
#   cd byok/scripts && ./index-content.sh
#
# Depois, atualize os valores de vector_db_id e db_path
# conforme output do script.
#
# Referencia: https://lightspeed-core.github.io/lightspeed-stack/byok_guide.html

name: Lightspeed Core Service (LCS)

service:
  host: localhost
  port: 8080
  auth_enabled: false

# Configuracao do BYOK - Red Hat Connectivity Link
byok_rag:
  - rag_id: rh-connectivity-link
    rag_type: inline::faiss
    # Modelo de embedding usado na indexacao
    embedding_model: sentence-transformers/all-mpnet-base-v2
    embedding_dimension: 768
    # ATUALIZE apos executar index-content.sh
    vector_db_id: vs_placeholder_replace_me
    db_path: /path/to/vector_db/faiss_store.db
    # Score multiplier: prioridade media para este conhecimento
    score_multiplier: 1.0

# Estrategia RAG
rag:
  # Inline RAG: injeta contexto automaticamente antes de cada query
  inline:
    - rh-connectivity-link
    - okp

  # Tool RAG: LLM pode chamar file_search para buscar contexto sob demanda
  tool:
    - rh-connectivity-link
    - okp

# OKP provider (OpenShift Knowledge Provider) - documentacao oficial
okp:
  offline: true
