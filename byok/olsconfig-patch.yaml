# olsconfig-patch.yaml — Adiciona o RAG BYOK ao OLSConfig
#
# Conforme a documentação oficial (OLS 1.0), basta referenciar a imagem
# gerada pela lightspeed-rag-tool em spec.ols.rag:
#
#   oc patch olsconfig cluster --type merge --patch-file olsconfig-patch.yaml
#
# A imagem deve estar em um registry acessível pelo cluster.
# É possível listar várias imagens BYOK no array rag.

spec:
  ols:
    rag:
      - image: quay.io/<username>/byok-rhcl:latest

    # Opcional: usar SOMENTE o conhecimento BYOK, ignorando a base padrão
    # de documentação do OpenShift:
    # byokRAGOnly: true

    # Opcional: pull secrets para registry privado:
    # imagePullSecrets:
    #   - name: <my_pull_secret>
