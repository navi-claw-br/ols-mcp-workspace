apiVersion: apps/v1
kind: Deployment
metadata:
  name: rhcl-mcp-server
  namespace: ols-mcp-server
  labels:
    app: rhcl-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rhcl-mcp-server
  template:
    metadata:
      labels:
        app: rhcl-mcp-server
    spec:
      serviceAccountName: ols-mcp-server
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: rhcl-mcp-server
          image: ghcr.io/navi-claw-br/rhcl-mcp-server:latest
          imagePullPolicy: Always
          env:
            - name: MCP_PORT
              value: "8080"
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 100m
              memory: 256Mi
